<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
  <title>Operation: Shuriken</title>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    html,body{width:100%;height:100%;background:#0e0e0e;overflow:hidden}
    canvas{display:block;width:100%;height:100%;object-fit:contain}
    #loadingCanvas{display:none}
    #canvas{visibility:hidden}
    #loading{
      position:fixed;inset:0;display:flex;align-items:center;justify-content:center;
      background:#111;color:#e8e4dc;font:600 15px/1 system-ui,sans-serif;
      letter-spacing:.12em;pointer-events:none;transition:opacity .4s
    }
    #tap{
      position:fixed;inset:0;display:none;align-items:center;justify-content:center;
      flex-direction:column;background:rgba(10,10,10,0.92);
      color:#e8e4dc;cursor:pointer;-webkit-tap-highlight-color:transparent;
      touch-action:manipulation;z-index:10;
    }
    #tap .label{font:700 18px/1 system-ui,sans-serif;letter-spacing:.2em;opacity:.9}
    #tap .sub{margin-top:12px;font:400 12px/1 system-ui,sans-serif;letter-spacing:.12em;opacity:.45}
  </style>
</head>
<body>
  <div id="loading">LOADING…</div>
  <div id="tap">
    <div class="label">TAP TO START</div>
    <div class="sub">tap anywhere to enable audio</div>
  </div>
  <canvas id="loadingCanvas"></canvas>
  <canvas id="canvas" oncontextmenu="event.preventDefault()"></canvas>
  <script>
    var _audioUnlocked = false;
    var _gameReady     = false;

    function unlockAudio(cb) {
      if (_audioUnlocked) { if (cb) cb(); return; }
      try {
        var ctx = new (window.AudioContext || window.webkitAudioContext)();
        // Play a one-frame silent buffer — this is the iOS unlock trick
        var buf = ctx.createBuffer(1, 1, 22050);
        var src = ctx.createBufferSource();
        src.buffer = buf;
        src.connect(ctx.destination);
        src.start(0);
        ctx.resume().then(function() {
          _audioUnlocked = true;
          // Also resume love.js AL context if already created
          try { if (typeof AL !== 'undefined' && AL.currentCtx) AL.currentCtx.resume(); } catch(e){}
          if (cb) cb();
        }).catch(function() {
          _audioUnlocked = true;
          if (cb) cb();
        });
      } catch(e) {
        _audioUnlocked = true;
        if (cb) cb();
      }
    }

    function dismissTap() {
      var tap = document.getElementById('tap');
      if (tap) { tap.style.opacity = '0'; tap.style.transition = 'opacity .3s'; setTimeout(function(){ tap.remove(); }, 350); }
    }

    // Keep love.js AL context alive on every interaction
    function poke() {
      try { if (typeof AL !== 'undefined' && AL.currentCtx && AL.currentCtx.state === 'suspended') AL.currentCtx.resume(); } catch(e){}
    }
    ['touchstart','mousedown','keydown'].forEach(function(ev){
      document.addEventListener(ev, poke, {passive:true});
    });

    window.addEventListener("keydown",function(e){if([32,37,38,39,40].indexOf(e.keyCode)>-1)e.preventDefault();},false);
    window.onload=function(){window.focus();};

    var Module={
      arguments:["./game.love"],
      INITIAL_MEMORY:67108864,
      printErr:console.error.bind(console),
      canvas:(function(){
        var c=document.getElementById("canvas");
        c.addEventListener("webglcontextlost",function(e){e.preventDefault();location.reload();},false);
        return c;
      })(),
      setStatus:function(text){
        if(!text){
          _gameReady = true;
          document.getElementById("canvas").style.visibility="visible";
          var ld=document.getElementById("loading");
          if(ld){ld.style.opacity="0";setTimeout(function(){ld.remove();},500);}
          // Show tap-to-start on touch devices; on desktop just unlock silently
          var isTouch = ('ontouchstart' in window) || (navigator.maxTouchPoints > 0);
          if (isTouch) {
            var tap = document.getElementById('tap');
            if (tap) {
              tap.style.display = 'flex';
              tap.addEventListener('touchstart', function handler(e) {
                e.preventDefault();
                tap.removeEventListener('touchstart', handler);
                unlockAudio(dismissTap);
              }, {passive:false});
              tap.addEventListener('click', function handler2() {
                tap.removeEventListener('click', handler2);
                unlockAudio(dismissTap);
              });
            }
          } else {
            unlockAudio(null);
          }
        } else {
          var ld=document.getElementById("loading");
          if(ld) ld.textContent=text.replace(/\(.*?\)/g,"").trim()||"LOADING…";
        }
      },
      totalDependencies:0,
      remainingDependencies:0,
      monitorRunDependencies:function(left){
        this.remainingDependencies=left;
        this.totalDependencies=Math.max(this.totalDependencies,left);
        Module.setStatus(left?"Loading…":"");
      }
    };
    Module.setStatus("Loading…");
    window.onerror=function(){Module.setStatus("Error — check console");};
  </script>
  <script src="game.js"></script>
  <script async src="love.js" onload="Love(Module)"></script>
</body>
</html>
