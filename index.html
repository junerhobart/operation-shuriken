<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
  <title>Operation: Shuriken</title>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    html,body{width:100%;height:100%;background:#0e0e0e;overflow:hidden}
    canvas{display:block;width:100%;height:100%;object-fit:contain}
    #loadingCanvas{display:none}
    #canvas{visibility:hidden}
    #loading{
      position:fixed;inset:0;display:flex;align-items:center;justify-content:center;
      background:#111;color:#e8e4dc;font:600 15px/1 system-ui,sans-serif;
      letter-spacing:.12em;pointer-events:none;transition:opacity .4s
    }
    #start{
      position:fixed;inset:0;display:none;
      align-items:center;justify-content:center;
      background:rgba(10,10,10,0.88);
      cursor:pointer;-webkit-tap-highlight-color:transparent;
      touch-action:manipulation;z-index:10;
      transition:opacity .3s;
    }
    #start-label{
      font:700 17px/1 system-ui,sans-serif;
      letter-spacing:.22em;color:#e8e4dc;
      text-transform:uppercase;opacity:.88;
      pointer-events:none;
    }
  </style>
</head>
<body>
  <div id="loading">LOADING…</div>
  <div id="start"><div id="start-label">CLICK TO PLAY</div></div>
  <canvas id="loadingCanvas"></canvas>
  <canvas id="canvas" oncontextmenu="event.preventDefault()"></canvas>
  <script>
    // ── Audio unlock ─────────────────────────────────────────────────────────
    // Intercept AudioContext creation so we hold a reference to love.js's instance.
    (function() {
      var Orig = window.AudioContext || window.webkitAudioContext;
      if (!Orig) return;
      var _ctxs = [];

      window._silentUnlock = function(ctx) {
        try {
          var buf = ctx.createBuffer(1, 1, 22050);
          var src = ctx.createBufferSource();
          src.buffer = buf; src.connect(ctx.destination); src.start(0);
          ctx.resume();
        } catch(e) {}
      };

      var Wrapped = function AudioContext(opts) {
        var ctx = opts ? new Orig(opts) : new Orig();
        _ctxs.push(ctx);
        return ctx;
      };
      Wrapped.prototype = Orig.prototype;
      window.AudioContext = window.webkitAudioContext = Wrapped;

      window._unlockAllCtxs = function() {
        _ctxs.forEach(window._silentUnlock);
        try {
          if (typeof AL !== 'undefined' && AL.currentCtx && _ctxs.indexOf(AL.currentCtx) < 0)
            window._silentUnlock(AL.currentCtx);
        } catch(e) {}
      };

      // Keep re-poking on every gesture in case iOS re-suspends
      document.addEventListener('touchstart', function() { window._unlockAllCtxs(); }, {passive:true});
      document.addEventListener('mousedown',  function() { window._unlockAllCtxs(); }, {passive:true});
    })();
    // ─────────────────────────────────────────────────────────────────────────

    window.addEventListener("keydown",function(e){if([32,37,38,39,40].indexOf(e.keyCode)>-1)e.preventDefault();},false);
    window.onload=function(){window.focus();};

    var Module={
      arguments:["./game.love"],
      INITIAL_MEMORY:67108864,
      printErr:console.error.bind(console),
      canvas:(function(){
        var c=document.getElementById("canvas");
        c.addEventListener("webglcontextlost",function(e){e.preventDefault();location.reload();},false);
        return c;
      })(),
      setStatus:function(text){
        if(!text){
          // Game finished loading — show the start overlay
          document.getElementById("canvas").style.visibility="visible";
          var ld=document.getElementById("loading");
          if(ld){ld.style.opacity="0";setTimeout(function(){ld.remove();},500);}

          var isTouch = ('ontouchstart' in window) || navigator.maxTouchPoints > 0;
          var overlay = document.getElementById("start");
          document.getElementById("start-label").textContent = isTouch ? "TAP TO PLAY" : "CLICK TO PLAY";
          overlay.style.display = "flex";

          function dismiss(e) {
            if (e) e.preventDefault();
            window._unlockAllCtxs();
            overlay.style.opacity = "0";
            setTimeout(function(){ overlay.remove(); }, 320);
            overlay.removeEventListener("mousedown", dismiss);
            overlay.removeEventListener("touchstart", dismiss);
            overlay.removeEventListener("keydown", dismiss);
          }
          overlay.addEventListener("mousedown",  dismiss, {passive:false});
          overlay.addEventListener("touchstart", dismiss, {passive:false});
          document.addEventListener("keydown",   dismiss, {once:true});
        } else {
          var ld=document.getElementById("loading");
          if(ld) ld.textContent=text.replace(/\(.*?\)/g,"").trim()||"LOADING…";
        }
      },
      totalDependencies:0,
      remainingDependencies:0,
      monitorRunDependencies:function(left){
        this.remainingDependencies=left;
        this.totalDependencies=Math.max(this.totalDependencies,left);
        Module.setStatus(left?"Loading…":"");
      }
    };
    Module.setStatus("Loading…");
    window.onerror=function(){Module.setStatus("Error — check console");};
  </script>
  <script src="game.js"></script>
  <script async src="love.js" onload="Love(Module)"></script>
</body>
</html>
