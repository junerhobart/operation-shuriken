<!doctype html>
<html lang="en-us">
  <head>
    <meta charset="utf-8">
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, minimum-scale=1, maximum-scale=1, user-scalable=no">
    <title>Operation Shuriken</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Jersey+25&display=swap" rel="stylesheet">
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }

      html, body {
        width: 100%; height: 100%;
        overflow: hidden;
        background: #edeae3;
        font-family: 'Jersey 25', arial, sans-serif;
      }

      #canvas {
        position: fixed;
        top: 0; left: 0;
        width: 100vw; height: 100vh;
        display: block;
        border: none;
        padding: 0;
        visibility: hidden;
      }

      #loading-overlay {
        position: fixed;
        top: 0; left: 0;
        width: 100%; height: 100%;
        background: #edeae3;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 20px;
        z-index: 10;
        pointer-events: none;
      }

      #loading-title {
        font-size: 52px;
        color: #1a1917;
        letter-spacing: 0.04em;
        line-height: 1;
      }

      #loading-bar-track {
        width: 200px;
        height: 2px;
        background: #ccc9c2;
      }

      #loading-bar-fill {
        height: 100%;
        background: #1a1917;
        width: 0%;
        transition: width 0.2s ease;
      }

      #loading-status {
        font-size: 16px;
        color: #75736e;
        letter-spacing: 0.06em;
      }

      #error-box {
        position: fixed;
        top: 20px; left: 50%; transform: translateX(-50%);
        background: #1a1917;
        color: #edeae3;
        padding: 12px 20px;
        max-width: 560px;
        width: calc(100vw - 40px);
        font-size: 14px;
        line-height: 1.5;
        letter-spacing: 0.02em;
        z-index: 100;
        display: none;
        text-align: left;
      }
    </style>
  </head>
  <body>
    <script src="coi-serviceworker.js"></script>

    <div id="loading-overlay">
      <div id="loading-title">OPERATION SHURIKEN</div>
      <div id="loading-bar-track"><div id="loading-bar-fill"></div></div>
      <div id="loading-status">loading</div>
    </div>
    <div id="error-box"></div>
    <canvas id="canvas" oncontextmenu="event.preventDefault()"></canvas>

    <script type="text/javascript">
      function goFullScreen() {
        var c = document.getElementById("canvas");
        if (c.requestFullScreen) c.requestFullScreen();
        else if (c.webkitRequestFullScreen) c.webkitRequestFullScreen();
        else if (c.mozRequestFullScreen) c.mozRequestFullScreen();
      }

      function FullScreenHook() {
        var c = document.getElementById("canvas");
        c.width  = window.innerWidth  || document.documentElement.clientWidth  || document.body.clientWidth;
        c.height = window.innerHeight || document.documentElement.clientHeight || document.body.clientHeight;
      }

      function showError(msg) {
        var box = document.getElementById("error-box");
        box.style.display = "block";
        box.innerHTML = "<strong>Error:</strong> " + msg;
      }

      window.onload  = function () { window.focus(); };
      window.onclick = function () { window.focus(); };
      window.addEventListener("keydown", function (e) {
        if ([32, 37, 38, 39, 40].indexOf(e.keyCode) > -1) e.preventDefault();
      }, false);

      var Module = {
        arguments: ["./game.love"],
        INITIAL_MEMORY: 67108864,
        printErr: console.error.bind(console),
        canvas: (function () {
          var c = document.getElementById("canvas");
          c.width  = window.innerWidth;
          c.height = window.innerHeight;
          c.addEventListener("webglcontextlost", function (e) {
            showError("WebGL context lost — reload the page.");
            e.preventDefault();
          }, false);
          return c;
        })(),
        setStatus: function (text) {
          var overlay = document.getElementById("loading-overlay");
          var status  = document.getElementById("loading-status");
          var bar     = document.getElementById("loading-bar-fill");

          if (!text) {
            if (Module.remainingDependencies === 0) {
              overlay.style.display = "none";
              document.getElementById("canvas").style.visibility = "visible";
            }
            return;
          }

          status.textContent = text.toLowerCase();
          var m = text.match(/\((\d+)\/(\d+)\)/);
          if (m) bar.style.width = Math.round((+m[1] / +m[2]) * 100) + "%";
        },
        totalDependencies: 0,
        remainingDependencies: 0,
        monitorRunDependencies: function (left) {
          this.remainingDependencies = left;
          this.totalDependencies = Math.max(this.totalDependencies, left);
          Module.setStatus(left
            ? "Preparing... (" + (this.totalDependencies - left) + "/" + this.totalDependencies + ")"
            : "All downloads complete."
          );
        }
      };

      Module.setStatus("downloading");

      window.onerror = function (msg, src, line, col, err) {
        var text = (err && err.message) ? err.message : String(msg);
        showError(text + " (see browser console for details)");
        Module.setStatus = function (t) {
          if (t) Module.printErr("[post-exception] " + t);
        };
      };

      var applicationLoad = function () { Love(Module); };

      if (typeof SharedArrayBuffer === "undefined") {
        document.getElementById("loading-status").textContent = "activating...";
        try {
          if (!sessionStorage.getItem("sab_reloaded")) {
            sessionStorage.setItem("sab_reloaded", "1");
            setTimeout(function () { location.reload(); }, 1200);
          } else {
            showError("SharedArrayBuffer unavailable. Try a different browser or disable privacy shields.");
          }
        } catch (e) {
          setTimeout(function () { location.reload(); }, 1200);
        }
      } else {
        sessionStorage.removeItem("sab_reloaded");
        var s1 = document.createElement("script");
        s1.src = "game.js";
        s1.onload = function () {
          var s2 = document.createElement("script");
          s2.async = true;
          s2.src = "love.js";
          s2.onload = applicationLoad;
          document.body.appendChild(s2);
        };
        document.body.appendChild(s1);
      }
    </script>
  </body>
</html>
