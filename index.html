<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
  <title>Operation: Shuriken</title>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    html,body{width:100%;height:100%;background:#0e0e0e;overflow:hidden}
    canvas{display:block;width:100%;height:100%;object-fit:contain}
    #loadingCanvas{display:none}
    #canvas{visibility:hidden}
    #loading{
      position:fixed;inset:0;display:flex;align-items:center;justify-content:center;
      background:#111;color:#e8e4dc;font:600 15px/1 system-ui,sans-serif;
      letter-spacing:.12em;pointer-events:none;transition:opacity .4s
    }
  </style>
</head>
<body>
  <div id="loading">LOADING…</div>
  <canvas id="loadingCanvas"></canvas>
  <canvas id="canvas" oncontextmenu="event.preventDefault()"></canvas>
  <script>
    // ── Audio unlock ────────────────────────────────────────────────────────
    // Intercept every AudioContext created (including love.js's internal one)
    // so we can play a silent buffer through the exact instance on first gesture.
    (function() {
      var Orig = window.AudioContext || window.webkitAudioContext;
      if (!Orig) return;

      var _ctxs      = [];   // all contexts ever created
      var _unlocked  = false;

      function silentUnlock(ctx) {
        try {
          var buf = ctx.createBuffer(1, 1, 22050);
          var src = ctx.createBufferSource();
          src.buffer = buf;
          src.connect(ctx.destination);
          src.start(0);
          ctx.resume();
        } catch(e) {}
      }

      function onGesture() {
        if (_unlocked) return;
        _unlocked = true;
        // Unlock every context we know about (including AL.currentCtx)
        _ctxs.forEach(silentUnlock);
        try { if (typeof AL !== 'undefined' && AL.currentCtx && _ctxs.indexOf(AL.currentCtx) < 0) silentUnlock(AL.currentCtx); } catch(e) {}
        // Keep poking AL context on every subsequent gesture so iOS doesn't re-suspend
        ['touchstart','mousedown'].forEach(function(ev) {
          document.removeEventListener(ev, onGesture);
        });
        document.addEventListener('touchstart', poke, {passive:true});
        document.addEventListener('mousedown',  poke, {passive:true});
      }

      function poke() {
        try { if (typeof AL !== 'undefined' && AL.currentCtx && AL.currentCtx.state === 'suspended') silentUnlock(AL.currentCtx); } catch(e) {}
      }

      // Wrap AudioContext so we capture love.js's instance
      var Wrapped = function AudioContext(opts) {
        var ctx = opts ? new Orig(opts) : new Orig();
        _ctxs.push(ctx);
        if (_unlocked) silentUnlock(ctx);  // already had gesture — unlock immediately
        return ctx;
      };
      Wrapped.prototype = Orig.prototype;
      window.AudioContext = window.webkitAudioContext = Wrapped;

      ['touchstart','mousedown','keydown'].forEach(function(ev) {
        document.addEventListener(ev, onGesture, {passive:true});
      });
    })();
    // ────────────────────────────────────────────────────────────────────────

    window.addEventListener("keydown",function(e){if([32,37,38,39,40].indexOf(e.keyCode)>-1)e.preventDefault();},false);
    window.onload=function(){window.focus();};

    var Module={
      arguments:["./game.love"],
      INITIAL_MEMORY:67108864,
      printErr:console.error.bind(console),
      canvas:(function(){
        var c=document.getElementById("canvas");
        c.addEventListener("webglcontextlost",function(e){e.preventDefault();location.reload();},false);
        return c;
      })(),
      setStatus:function(text){
        if(!text){
          document.getElementById("canvas").style.visibility="visible";
          var ld=document.getElementById("loading");
          if(ld){ld.style.opacity="0";setTimeout(function(){ld.remove();},500);}
        } else {
          var ld=document.getElementById("loading");
          if(ld) ld.textContent=text.replace(/\(.*?\)/g,"").trim()||"LOADING…";
        }
      },
      totalDependencies:0,
      remainingDependencies:0,
      monitorRunDependencies:function(left){
        this.remainingDependencies=left;
        this.totalDependencies=Math.max(this.totalDependencies,left);
        Module.setStatus(left?"Loading…":"");
      }
    };
    Module.setStatus("Loading…");
    window.onerror=function(){Module.setStatus("Error — check console");};
  </script>
  <script src="game.js"></script>
  <script async src="love.js" onload="Love(Module)"></script>
</body>
</html>
