<!doctype html>
<html lang="en-us">
  <head>
    <meta charset="utf-8">
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, minimum-scale=1, maximum-scale=1, user-scalable=no">
    <title>Operation Shuriken</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body {
        width: 100%; height: 100%;
        overflow: hidden;
        background: #0d0d0d;
      }
      #canvas {
        position: fixed;
        top: 0; left: 0;
        width: 100vw; height: 100vh;
        display: block;
        border: none;
        padding: 0;
        visibility: hidden;
      }
      #loading-overlay {
        position: fixed;
        top: 0; left: 0;
        width: 100%; height: 100%;
        background: #0d0d0d;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 16px;
        z-index: 10;
        pointer-events: none;
      }
      #loading-title {
        font: bold 22px arial;
        color: #e8e8e8;
        letter-spacing: 0.05em;
      }
      #loading-status {
        font: 13px arial;
        color: #666;
      }
      #loading-bar-track {
        width: 240px;
        height: 3px;
        background: #222;
        border-radius: 2px;
        overflow: hidden;
      }
      #loading-bar-fill {
        height: 100%;
        background: #aaa;
        width: 0%;
        transition: width 0.2s ease;
        border-radius: 2px;
      }
      #error-box {
        position: fixed;
        top: 16px; left: 50%; transform: translateX(-50%);
        background: rgba(120, 0, 0, 0.92);
        color: #ffd;
        padding: 12px 18px;
        border-radius: 6px;
        max-width: 580px;
        width: calc(100vw - 40px);
        font: 13px/1.5 arial;
        z-index: 100;
        display: none;
        text-align: left;
      }
    </style>
  </head>
  <body>
    <script src="coi-serviceworker.js"></script>

    <div id="loading-overlay">
      <div id="loading-title">Operation Shuriken</div>
      <div id="loading-bar-track"><div id="loading-bar-fill"></div></div>
      <div id="loading-status">Loading...</div>
    </div>
    <div id="error-box"></div>
    <canvas id="canvas" oncontextmenu="event.preventDefault()"></canvas>

    <script type="text/javascript">
      function goFullScreen() {
        var c = document.getElementById("canvas");
        if (c.requestFullScreen) c.requestFullScreen();
        else if (c.webkitRequestFullScreen) c.webkitRequestFullScreen();
        else if (c.mozRequestFullScreen) c.mozRequestFullScreen();
      }

      function FullScreenHook() {
        var c = document.getElementById("canvas");
        c.width  = window.innerWidth  || document.documentElement.clientWidth  || document.body.clientWidth;
        c.height = window.innerHeight || document.documentElement.clientHeight || document.body.clientHeight;
      }

      function showError(msg) {
        var box = document.getElementById("error-box");
        box.style.display = "block";
        box.innerHTML = "<strong>Error:</strong> " + msg;
      }

      window.onload  = function () { window.focus(); };
      window.onclick = function () { window.focus(); };
      window.addEventListener("keydown", function (e) {
        if ([32, 37, 38, 39, 40].indexOf(e.keyCode) > -1) e.preventDefault();
      }, false);

      var Module = {
        arguments: ["./game.love"],
        INITIAL_MEMORY: 67108864,
        printErr: console.error.bind(console),
        canvas: (function () {
          var c = document.getElementById("canvas");
          c.width  = window.innerWidth;
          c.height = window.innerHeight;
          c.addEventListener("webglcontextlost", function (e) {
            showError("WebGL context lost — reload the page.");
            e.preventDefault();
          }, false);
          return c;
        })(),
        setStatus: function (text) {
          var overlay = document.getElementById("loading-overlay");
          var status  = document.getElementById("loading-status");
          var bar     = document.getElementById("loading-bar-fill");

          if (!text) {
            if (Module.remainingDependencies === 0) {
              overlay.style.display = "none";
              document.getElementById("canvas").style.visibility = "visible";
            }
            return;
          }

          status.textContent = text;
          var m = text.match(/\((\d+)\/(\d+)\)/);
          if (m) bar.style.width = Math.round((+m[1] / +m[2]) * 100) + "%";
        },
        totalDependencies: 0,
        remainingDependencies: 0,
        monitorRunDependencies: function (left) {
          this.remainingDependencies = left;
          this.totalDependencies = Math.max(this.totalDependencies, left);
          Module.setStatus(left
            ? "Preparing... (" + (this.totalDependencies - left) + "/" + this.totalDependencies + ")"
            : "All downloads complete."
          );
        }
      };

      Module.setStatus("Downloading...");

      window.onerror = function (msg, src, line, col, err) {
        var text = (err && err.message) ? err.message : String(msg);
        if (text.indexOf("SharedArrayBuffer") !== -1) {
          document.getElementById("loading-status").textContent = "Activating... reloading";
          setTimeout(function () { location.reload(); }, 800);
          return;
        }
        showError(text + " (see browser console for details)");
        Module.setStatus = function (t) {
          if (t) Module.printErr("[post-exception] " + t);
        };
      };

      var applicationLoad = function () { Love(Module); };
    </script>

    <script type="text/javascript" src="game.js"></script>
    <script async type="text/javascript" src="love.js" onload="applicationLoad()"></script>
  </body>
</html>
