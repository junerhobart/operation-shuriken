name: Build Web

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install love.js
        run: npm install -g love.js

      - name: Package game
        run: |
          zip -9 -r game.love . \
            -x ".git/*" \
            -x ".github/*" \
            -x "build/*" \
            -x "banner/*" \
            -x "docs/*" \
            -x "*.md" \
            -x ".DS_Store" \
            -x "*.love"

      - name: Build web
        run: love.js -t "Operation Shuriken" -m 67108864 game.love /tmp/web-output

      - name: Get coi-serviceworker
        run: |
          curl -sL "https://cdn.jsdelivr.net/npm/coi-serviceworker/coi-serviceworker.min.js" \
            -o /tmp/web-output/coi-serviceworker.js

      - name: Deploy to web-build
        run: |
          SHORT_SHA=$(git rev-parse --short HEAD)
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git fetch origin web-build
          git checkout web-build
          cp /tmp/web-output/game.data .
          cp /tmp/web-output/game.js .
          cp /tmp/web-output/love.js .
          cp /tmp/web-output/love.wasm .
          cp /tmp/web-output/love.worker.js .
          cp /tmp/web-output/coi-serviceworker.js .
          cp .github/web/index.html .
          touch .nojekyll
          git add -A
          git diff --cached --quiet || git commit -m "Web build from main@$SHORT_SHA"
          git push origin web-build
