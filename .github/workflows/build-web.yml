name: Build Web

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install love.js
        run: npm install -g love.js

      - name: Package game
        run: |
          zip -9 -r game.love . \
            -x ".git/*" \
            -x ".github/*" \
            -x "build/*" \
            -x "banner/*" \
            -x "docs/*" \
            -x "*.md" \
            -x ".DS_Store" \
            -x "*.love"

      - name: Build web
        run: love.js -t "Operation Shuriken" -m 67108864 game.love /tmp/web-output

      - name: Deploy to web-build
        run: |
          SHORT_SHA=$(git rev-parse --short HEAD)
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git fetch origin web-build
          git checkout web-build
          find . -maxdepth 1 ! -name '.git' ! -name '.github' ! -name '.' -exec rm -rf {} + 2>/dev/null || true
          cp -r /tmp/web-output/. .
          git add -A
          git diff --cached --quiet || git commit -m "Web build from main@$SHORT_SHA"
          git push origin web-build
