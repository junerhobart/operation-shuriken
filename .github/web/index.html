<!doctype html>
<html lang="en-us">
  <head>
    <meta charset="utf-8">
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no, minimum-scale=1, maximum-scale=1">
    <title>Operation Shuriken</title>
    <link rel="stylesheet" type="text/css" href="theme/love.css">
  </head>
  <body>
    <script src="coi-serviceworker.js"></script>
    <center>
      <div>
        <h1>Operation Shuriken</h1>
        <div id="error-box" style="display:none;color:#8b0000;background:#fff0f0;border:1px solid #c00;padding:10px 14px;max-width:800px;text-align:left;border-radius:4px;margin:8px auto;font-size:13px;line-height:1.5;"></div>
        <canvas id="loadingCanvas" oncontextmenu="event.preventDefault()" width="800" height="600"></canvas>
        <canvas id="canvas" oncontextmenu="event.preventDefault()"></canvas>
      </div>
    </center>

    <script type='text/javascript'>
      function goFullScreen() {
        var canvas = document.getElementById("canvas");
        if (canvas.requestFullScreen) canvas.requestFullScreen();
        else if (canvas.webkitRequestFullScreen) canvas.webkitRequestFullScreen();
        else if (canvas.mozRequestFullScreen) canvas.mozRequestFullScreen();
      }

      function FullScreenHook() {
        var canvas = document.getElementById("canvas");
        canvas.width = window.innerWidth || document.documentElement.clientWidth || document.body.clientWidth;
        canvas.height = window.innerHeight || document.documentElement.clientHeight || document.body.clientHeight;
      }

      function showError(msg) {
        var box = document.getElementById("error-box");
        box.style.display = "block";
        box.innerHTML = "<strong>Something went wrong:</strong> " + msg;
      }

      var loadingCtx = document.getElementById("loadingCanvas").getContext("2d");
      function drawLoadingText(text) {
        var canvas = loadingCtx.canvas;
        loadingCtx.fillStyle = "rgb(142, 195, 227)";
        loadingCtx.fillRect(0, 0, canvas.scrollWidth, canvas.scrollHeight);
        loadingCtx.font = "2em arial";
        loadingCtx.textAlign = "center";
        loadingCtx.fillStyle = "rgb(11, 86, 117)";
        loadingCtx.fillText(text, canvas.scrollWidth / 2, canvas.scrollHeight / 2);
        loadingCtx.fillText("Powered By Emscripten.", canvas.scrollWidth / 2, canvas.scrollHeight / 4);
        loadingCtx.fillText("Powered By LÖVE.", canvas.scrollWidth / 2, canvas.scrollHeight / 4 * 3);
      }

      window.onload = function () { window.focus(); };
      window.onclick = function () { window.focus(); };
      window.addEventListener("keydown", function (e) {
        if ([32, 37, 38, 39, 40].indexOf(e.keyCode) > -1) e.preventDefault();
      }, false);

      var Module = {
        arguments: ["./game.love"],
        INITIAL_MEMORY: 67108864,
        printErr: console.error.bind(console),
        canvas: (function () {
          var canvas = document.getElementById("canvas");
          canvas.addEventListener("webglcontextlost", function (e) {
            showError("WebGL context lost. Reload the page.");
            e.preventDefault();
          }, false);
          return canvas;
        })(),
        setStatus: function (text) {
          if (text) {
            drawLoadingText(text);
          } else if (Module.remainingDependencies === 0) {
            document.getElementById("loadingCanvas").style.display = "none";
            document.getElementById("canvas").style.visibility = "visible";
          }
        },
        totalDependencies: 0,
        remainingDependencies: 0,
        monitorRunDependencies: function (left) {
          this.remainingDependencies = left;
          this.totalDependencies = Math.max(this.totalDependencies, left);
          Module.setStatus(left
            ? "Preparing... (" + (this.totalDependencies - left) + "/" + this.totalDependencies + ")"
            : "All downloads complete."
          );
        }
      };

      Module.setStatus("Downloading...");

      window.onerror = function (msg, src, line, col, err) {
        var text = (err && err.message) ? err.message : String(msg);
        if (text.indexOf("SharedArrayBuffer") !== -1) {
          showError(
            "SharedArrayBuffer unavailable. The page needs Cross-Origin Isolation headers to run. " +
            "<strong>Reload once</strong> — the service worker activates on the second load."
          );
        } else {
          showError(text + " (see browser console for details)");
        }
        Module.setStatus = function (t) {
          if (t) Module.printErr("[post-exception] " + t);
        };
      };

      var applicationLoad = function (e) {
        Love(Module);
      };
    </script>

    <script type="text/javascript" src="game.js"></script>
    <script async type="text/javascript" src="love.js" onload="applicationLoad(this)"></script>

    <footer>
      <p>
        Built with <a href="https://github.com/Davidobot/love.js">love.js</a>
        &nbsp;<button onclick="goFullScreen();">Go Fullscreen</button>
        <br>Hint: Reload the page if the screen is blank
      </p>
    </footer>
  </body>
</html>
